services:
  - type: web
    name: job-portal
    runtime: docker
    plan: free
    # Root directory must be the base folder so Docker can see both /frontend and /backend
    rootDir: .
    # Use the Dockerfile located in the root (but backend/Dockerfile is also available as fallback)
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
